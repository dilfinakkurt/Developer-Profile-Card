kind = "mobile"
previewPath = "/"
title = "Yazılımcı Kimlik Kartı"
version = "1.0.0"
id = "artifacts/yazilimci-kimlik"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 18107
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/yazilimci-kimlik run dev"

[services.env]
PORT = "18107"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/yazilimci-kimlik", "run", "build"]
run = ["pnpm", "--filter", "@workspace/yazilimci-kimlik", "run", "serve"]
